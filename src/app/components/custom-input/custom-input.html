<div
  class="custom-input"
  [class.disabled]="isDisabled()"
  [class.focused]="isFocused()"
  [class.has-error]="!!error()"
  [class.appearance-outlined]="appearance() === 'outlined'"
  [class.label-floated]="isLabelFloated()"
>
  @if (label() && appearance() !== 'outlined') {
    <label class="custom-input__label" [attr.for]="controlId">{{ label() }}</label>
  }

  <div class="custom-input__field">
    @if (label() && appearance() === 'outlined') {
      <label class="custom-input__label custom-input__label--floating" [attr.for]="controlId">{{ label() }}</label>
    }

    @if (prefixIcon(); as icon) {
      <span class="custom-input__prefix" aria-hidden="true">
        <svg [lucideIcon]="icon" [size]="18"></svg>
      </span>
    }

    <input
      class="custom-input__control"
      [class.custom-input__control--has-clear]="clearable()"
      [id]="controlId"
      [type]="type()"
      [placeholder]="effectivePlaceholder()"
      [disabled]="isDisabled()"
      [value]="value()"
      [attr.autocomplete]="autocomplete()"
      [attr.spellcheck]="spellcheck()"
      [attr.aria-invalid]="error() ? true : null"
      [attr.aria-describedby]="describedBy()"
      (input)="onInput($event)"
      (focus)="onFocus()"
      (blur)="onBlur()"
    />

    @if (clearable() && hasValue() && !isDisabled()) {
      <button
        class="custom-input__clear"
        type="button"
        aria-label="Clear input"
        (mousedown)="clearValue($event)"
      >
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="18" y1="6" x2="6" y2="18" />
          <line x1="6" y1="6" x2="18" y2="18" />
        </svg>
      </button>
    }
  </div>

  @if (error()) {
    <span [id]="errorId" class="custom-input__message custom-input__message--error" role="alert">{{ error() }}</span>
  } @else if (hint()) {
    <span [id]="hintId" class="custom-input__message custom-input__message--hint">{{ hint() }}</span>
  }
</div>
