<div class="link-card" [class.open]="isOpen()" [class.disabled]="disabled">
  <button
    class="link-card__trigger"
    type="button"
    tabindex="0"
    [disabled]="disabled"
    (click)="toggle()"
    (keydown)="onKeyDown($event)"
  >
    @if (icon) {
      <span class="link-card__icon">
        <app-dropdown-link-card-icon [icon]="icon" [size]="20" />
      </span>
    }

    <span class="link-card__title">{{ title }}</span>

    <span class="link-card__arrow">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9" />
      </svg>
    </span>
  </button>

  @if (isOpen()) {
    <div class="link-card__dropdown">
      @for (link of links; track link.url; let i = $index) {
        <a
          class="link-card__link"
          [class.focused]="focusedIndex() === i"
          [href]="link.url"
          target="_blank"
          rel="noopener noreferrer"
          (click)="$event.preventDefault(); openLink(link)"
        >
          @if (link.icon) {
            <span class="link-card__link-icon">
              <app-dropdown-link-card-icon [icon]="link.icon" [size]="18" />
            </span>
          }
          <div class="link-card__link-content">
            <span class="link-card__link-label">{{ link.label }}</span>
            @if (link.description) {
              <span class="link-card__link-desc">{{ link.description }}</span>
            }
          </div>
          <span class="link-card__external">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6" />
              <polyline points="15 3 21 3 21 9" />
              <line x1="10" y1="14" x2="21" y2="3" />
            </svg>
          </span>
        </a>
      } @empty {
        <div class="link-card__empty">No links available</div>
      }
    </div>
  }
</div>
