<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar__brand">
      <h1 class="sidebar__title">Angular Components</h1>
      <p class="sidebar__subtitle">Component showcase</p>
    </div>

    <nav class="sidebar__nav" aria-label="Components">
      @for (item of navItems; track item.path) {
        <a
          class="sidebar__link"
          [routerLink]="item.path"
          routerLinkActive="sidebar__link--active"
        >
          <span class="sidebar__link-label">{{ item.label }}</span>
          <span class="sidebar__link-desc">{{ item.description }}</span>
        </a>
      }
    </nav>

    <div class="sidebar__footer">
      <button
        type="button"
        class="sidebar__theme-toggle"
        (click)="themeService.toggle()"
        [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        @if (themeService.theme() === 'dark') {
          <span aria-hidden="true">☀️</span>
          <span>Light mode</span>
        } @else {
          <span aria-hidden="true">🌙</span>
          <span>Dark mode</span>
        }
      </button>
    </div>
  </aside>

  <main class="main">
    <router-outlet />
  </main>
</div>
