<div class="app-shell">
  <aside class="sidebar">
    <div class="sidebar__brand">
      <h1 class="sidebar__title">Angular Components</h1>
      <p class="sidebar__subtitle">Component showcase</p>
    </div>

    <nav class="sidebar__nav" aria-label="Components">
      @for (item of navItems; track item.path) {
        <a
          class="sidebar__link"
          [routerLink]="item.path"
          routerLinkActive="sidebar__link--active"
        >
          <span class="sidebar__link-label">{{ item.label }}</span>
          <span class="sidebar__link-desc">{{ item.description }}</span>
        </a>
      }
    </nav>
  </aside>

  <div class="content">
    <header class="topbar">
      <div class="topbar__title-group">
        <h2 class="topbar__title">{{ pageTitle() }}</h2>
        @if (pageDescription()) {
          <p class="topbar__subtitle">{{ pageDescription() }}</p>
        }
      </div>

      <button
        type="button"
        class="topbar__theme-toggle"
        (click)="themeService.toggle()"
        [attr.aria-label]="themeService.theme() === 'dark' ? 'Switch to light mode' : 'Switch to dark mode'"
      >
        @if (themeService.theme() === 'dark') {
          <svg [lucideIcon]="LucideSun" [size]="18" aria-hidden="true"></svg>
          <span>Light mode</span>
        } @else {
          <svg [lucideIcon]="LucideMoon" [size]="18" aria-hidden="true"></svg>
          <span>Dark mode</span>
        }
      </button>
    </header>

    <main class="main">
      <router-outlet />
    </main>
  </div>
</div>
